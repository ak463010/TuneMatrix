name: Feature request
description: Suggest an improvement for TuneMatrix
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe the workflow or problem you want to solve.
  - type: textarea
    id: problem
    attributes:
      label: Problem or workflow
      description: What are you trying to do, and what is difficult today?
      placeholder: I want to...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What should TuneMatrix do differently?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Are there workarounds or other designs?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - UI/UX
        - Import or project management
        - Analysis
        - Tempo/key processing
        - Stem separation
        - Export
        - Packaging/installers
        - Documentation
        - Tests/CI
        - Other
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Example workflow
      description: Give a concrete example, if possible.
  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to help implement or test this feature
