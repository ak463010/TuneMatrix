name: Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact-suffix }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact-suffix: windows-x64
            portable-name: windows-x64-portable.zip
            tool-platform: windows
          - os: macos-latest
            artifact-suffix: macos-arm64
            portable-name: macos-arm64.zip
            tool-platform: macos
          - os: ubuntu-latest
            artifact-suffix: linux-x64
            portable-name: linux-x64.tar.gz
            tool-platform: linux

    env:
      QT_QPA_PLATFORM: offscreen
      PYTHON_VERSION: "3.11"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "RELEASE_VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_VERSION=dev-${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-test.txt
            requirements-build.txt

      - name: Install Linux GUI test packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgl1 libegl1 libxkbcommon-x11-0 dpkg-dev

      - name: Install Windows installer tools
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          choco install nsis -y --no-progress
          "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH
          "C:\Program Files\NSIS" >> $env:GITHUB_PATH

      - name: Install Python dependencies on Linux
        if: runner.os == 'Linux'
        run: |
          python -m pip install --upgrade pip
          pip install "numpy<2"
          pip install torch==2.0.1+cpu torchaudio==2.0.2+cpu --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt "numpy<2"
          pip install -r requirements-test.txt
          pip install -r requirements-build.txt

      - name: Install Python dependencies on Windows and macOS
        if: runner.os != 'Linux'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt
          pip install -r requirements-build.txt

      - name: Show Torch install details
        run: |
          python -c "import numpy, torch, pathlib; print('numpy', numpy.__version__); print('torch', torch.__version__); print(pathlib.Path(torch.__file__).resolve().parent)"

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Stage bundled FFmpeg
        run: python packaging/tools/stage_ffmpeg.py --platform ${{ matrix.tool-platform }} --skip-unsupported

      - name: Stage bundled Rubber Band
        run: python packaging/tools/stage_rubberband.py --platform ${{ matrix.tool-platform }} --skip-unsupported

      - name: Verify staged runtime tools on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          if (Test-Path "tools\ffmpeg\bin\ffmpeg.exe") {
            & "tools\ffmpeg\bin\ffmpeg.exe" -version
          } else {
            "No bundled ffmpeg staged for ${{ matrix.tool-platform }}."
          }

          if (Test-Path "tools\rubberband\bin\rubberband.exe") {
            & "tools\rubberband\bin\rubberband.exe" --version
          } else {
            "No bundled Rubber Band staged for ${{ matrix.tool-platform }}."
          }

      - name: Verify staged runtime tools on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [ -x tools/ffmpeg/bin/ffmpeg ]; then
            tools/ffmpeg/bin/ffmpeg -version
          else
            echo "No bundled ffmpeg staged for ${{ matrix.tool-platform }}."
          fi

          if [ -x tools/rubberband/bin/rubberband ]; then
            tools/rubberband/bin/rubberband --version
          else
            echo "No bundled Rubber Band staged for ${{ matrix.tool-platform }}."
          fi

      - name: Build PyInstaller app
        run: pyinstaller --noconfirm --clean packaging/pyinstaller/TuneMatrix.spec

      - name: Smoke test Windows app
        if: runner.os == 'Windows'
        shell: powershell
        run: .\dist\TuneMatrix\TuneMatrix.exe --smoke-test

      - name: Smoke test macOS app
        if: runner.os == 'macOS'
        run: |
          if [ -x "dist/TuneMatrix.app/Contents/MacOS/TuneMatrix" ]; then
            dist/TuneMatrix.app/Contents/MacOS/TuneMatrix --smoke-test
          else
            dist/TuneMatrix/TuneMatrix --smoke-test
          fi

      - name: Smoke test Linux app
        if: runner.os == 'Linux'
        run: xvfb-run -a dist/TuneMatrix/TuneMatrix --smoke-test

      - name: Create artifact directory
        shell: bash
        run: mkdir -p release-artifacts

      - name: Create Windows portable archive
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Compress-Archive -Path .\dist\TuneMatrix -DestinationPath "release-artifacts\TuneMatrix-$env:RELEASE_VERSION-windows-x64-portable.zip" -Force

      - name: Create macOS portable archive
        if: runner.os == 'macOS'
        run: |
          if [ -d "dist/TuneMatrix.app" ]; then
            ditto -c -k --sequesterRsrc --keepParent dist/TuneMatrix.app "release-artifacts/TuneMatrix-${RELEASE_VERSION}-macos-arm64.zip"
          else
            ditto -c -k --keepParent dist/TuneMatrix "release-artifacts/TuneMatrix-${RELEASE_VERSION}-macos-arm64.zip"
          fi

      - name: Create Linux portable archive
        if: runner.os == 'Linux'
        run: tar -czf "release-artifacts/TuneMatrix-${RELEASE_VERSION}-linux-x64.tar.gz" -C dist TuneMatrix

      - name: Create Windows NSIS installer
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $makensis = (Get-Command makensis -ErrorAction SilentlyContinue).Source
          if (-not $makensis) {
            $candidates = @("C:\Program Files (x86)\NSIS\makensis.exe", "C:\Program Files\NSIS\makensis.exe")
            $makensis = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          }
          if (-not $makensis) { throw "makensis.exe was not found after installing NSIS." }
          & $makensis /DAPP_VERSION="$env:RELEASE_VERSION" /DDIST_DIR="$pwd\dist\TuneMatrix" /DOUTPUT_DIR="$pwd\release-artifacts" packaging\nsis\TuneMatrix.nsi

      - name: Create macOS DMG
        if: runner.os == 'macOS'
        run: |
          mkdir -p dmg-root
          if [ -d "dist/TuneMatrix.app" ]; then
            cp -R dist/TuneMatrix.app dmg-root/
          else
            cp -R dist/TuneMatrix dmg-root/
          fi
          hdiutil create -volname "TuneMatrix" -srcfolder dmg-root -ov -format UDZO "release-artifacts/TuneMatrix-${RELEASE_VERSION}-macos-arm64.dmg"

      - name: Create Linux Debian package
        if: runner.os == 'Linux'
        run: python packaging/linux/build_deb.py --dist-dir dist/TuneMatrix --output-dir release-artifacts --version "$RELEASE_VERSION"

      - name: List release artifacts
        shell: bash
        run: |
          ls -la release-artifacts
          python - <<'PY'
          from pathlib import Path
          limit = 2 * 1024 * 1024 * 1024
          for path in sorted(Path('release-artifacts').iterdir()):
              if path.is_file():
                  size = path.stat().st_size
                  print(f"{path.name}: {size / (1024 ** 2):.1f} MiB")
                  if size >= limit:
                      raise SystemExit(f"{path.name} is {size} bytes and exceeds GitHub's 2 GiB release asset limit")
          PY

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TuneMatrix-${{ env.RELEASE_VERSION }}-${{ matrix.artifact-suffix }}
          path: release-artifacts/TuneMatrix-*
          if-no-files-found: error

      - name: Upload artifacts to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if ! gh release view "$RELEASE_VERSION" >/dev/null 2>&1; then
            gh release create "$RELEASE_VERSION" --title "$RELEASE_VERSION" --notes "TuneMatrix $RELEASE_VERSION release artifacts. See CHANGELOG.md and docs/PACKAGING.md for details."
          fi
          release_files=()
          while IFS= read -r release_file; do
            release_files+=("$release_file")
          done < <(find release-artifacts -maxdepth 1 -type f -name 'TuneMatrix-*' | sort)
          if [ "${#release_files[@]}" -eq 0 ]; then
            echo "No release artifact files found."
            exit 1
          fi
          gh release upload "$RELEASE_VERSION" "${release_files[@]}" --clobber
